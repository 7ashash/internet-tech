<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Details | MUST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/final_style.css">
</head>
<body class="content-detail-page">
    <header class="detail-topbar">
        <div class="container detail-topbar-inner">
            <a href="index.html" class="detail-logo-link">
                <img src="images/must-logo.png" alt="MUST Logo" class="detail-logo">
                <span>Environmental and Community Service Sector</span>
            </a>
            <a href="index.html" class="detail-back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </header>

    <main class="detail-page-main">
        <section class="detail-hero">
            <div class="container">
                <p class="detail-eyebrow" id="detailEyebrow">MUST Content</p>
                <h1 id="detailTitle">Loading details...</h1>
                <div class="detail-meta" id="detailMeta"></div>
            </div>
        </section>

        <section class="detail-content-section">
            <div class="container">
                <div class="detail-card">
                    <div class="detail-image-wrap">
                        <img id="detailImage" src="images/logo-png.png" alt="Content image">
                    </div>
                    <div class="detail-copy-wrap">
                        <div class="detail-body-stack" id="detailDescription">Please wait while we load the selected item.</div>
                    </div>
                </div>
                <div class="detail-status hidden" id="detailStatus"></div>
            </div>
        </section>
    </main>

    <footer class="detail-footer">
        <p>Copyright All Right Reserved @ MUST UNIVERSITY 2025</p>
    </footer>

    <script src="js/content_detail.js"></script>
</body>
</html>
